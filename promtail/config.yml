server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  # Scrape all Docker container logs via the Docker socket
  - job_name: docker
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    relabel_configs:
      # Use the container name as the "container" label
      - source_labels: [__meta_docker_container_name]
        regex: "/(.*)"
        target_label: container
      # Include the Docker Compose service name if present
      - source_labels: [__meta_docker_container_label_com_docker_compose_service]
        target_label: compose_service
      # Include the Docker Compose project name if present
      - source_labels: [__meta_docker_container_label_com_docker_compose_project]
        target_label: compose_project
      # Pass through the container image
      - source_labels: [__meta_docker_container_image]
        target_label: image
    pipeline_stages:
      # Attempt to parse JSON log lines produced by the API
      - json:
          expressions:
            level: level
            message: message
            timestamp: timestamp
      # Promote parsed fields to Loki labels / structured metadata
      - labels:
          level:
      - output:
          source: message
