# ─────────────────────────────────────────────────────────────
#  Docker Logging Stack  –  Promtail → Loki → Grafana
#  Plus a small demo Node.js API that emits structured logs.
# ─────────────────────────────────────────────────────────────

networks:
  logging:
    driver: bridge

services:

  # ── Demo API ───────────────────────────────────────────────
  api:
    build:
      context: ./app
    container_name: demo-api
    ports:
      - "3000:3000"
    networks:
      - logging
    restart: unless-stopped
    # Logs go to stdout → Docker captures them → Promtail ships them
    logging:
      driver: "json-file"          # default driver, readable by Promtail
      options:
        max-size: "10m"
        max-file: "3"

  # ── Loki  (log aggregation & indexing) ────────────────────
  loki:
    image: grafana/loki:2.9.4
    container_name: loki
    user: "10001:10001"
    ports:
      - "3100:3100"
    volumes:
      - ./loki/config.yml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - logging
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:3100/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Promtail  (log collector / shipper) ───────────────────
  promtail:
    image: grafana/promtail:2.9.4
    container_name: promtail
    volumes:
      - ./promtail/config.yml:/etc/promtail/config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock  # read Docker container logs
    command: -config.file=/etc/promtail/config.yml
    networks:
      - logging
    depends_on:
      loki:
        condition: service_healthy
    restart: unless-stopped

  # ── Grafana  (visualisation) ──────────────────────────────
  grafana:
    image: grafana/grafana:10.3.3
    container_name: grafana
    ports:
      - "3001:3000"
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_DISABLE_LOGIN_FORM=true   # skip login for local dev
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    networks:
      - logging
    depends_on:
      loki:
        condition: service_healthy
    restart: unless-stopped

volumes:
  loki_data:
  grafana_data: